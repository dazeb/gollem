{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{{if .PageTitle}}{{.PageTitle}} · {{end}}{{.AppTitle}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/htmx.min.js"></script>
  <script defer src="/static/pretext.min.js"></script>
  <script type="module" src="/static/renderer.js"></script>
</head>
<body data-renderer-root data-route="{{.Path}}">
  <div class="shell">
    <header class="shell__header">
      <div>
        <p class="eyebrow">AGUI dashboard scaffold</p>
        <h1>{{.AppTitle}}</h1>
      </div>
      <nav class="shell__nav" aria-label="Primary">
        <a href="/" class="{{if eq .Path "/"}}is-active{{end}}">Dashboard</a>
        {{if .Run.ID}}<a href="/runs/{{.Run.ID}}" class="{{if .IsRunPage}}is-active{{end}}">Current run</a>{{end}}
      </nav>
    </header>

    <main class="shell__body">
      {{block "content" .}}{{end}}
    </main>

    <footer class="shell__footer">
      <span>Embedded templates, static assets, and serve-aware run defaults</span>
      <span>© {{.CurrentYear}} gollem</span>
    </footer>
  </div>
</body>
</html>
{{end}}
